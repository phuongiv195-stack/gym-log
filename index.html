<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#20241a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Log">
<title>Gym · Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1c16; --ink2:#2b2e24;
  --olive:#5b6a3d; --olive-lt:#7d8c58; --olive-dk:#3f4a2a;
  --gold:#d8a531; --gold-dk:#b7861a;
  --paper:#f3f1e7; --paper2:#e7e4d6; --line:#d3cfbe;
  --mut:#8a8b7c; --mut2:#a7a897;
  --good:#4f8a4d; --bad:#b5563f;
  --disp:'Oswald','Arial Narrow',system-ui,sans-serif;
  --body:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:var(--body); background:var(--ink); color:#e9e7db; padding-bottom:40px; overscroll-behavior-y:none}
.wrap{max-width:560px; margin:0 auto}
button{font-family:inherit}

/* ---- Top bar ---- */
header{position:sticky; top:0; z-index:20; background:var(--ink);
  padding:calc(env(safe-area-inset-top) + 12px) 16px 0; border-bottom:1px solid #33372a}
.brand{display:flex; align-items:center; gap:9px}
.brand b{font-family:var(--disp); font-weight:700; font-size:20px; letter-spacing:.5px; color:#fff; text-transform:uppercase}
.brand .sp{flex:1}
.pchip{border:1px solid #3a3f2e; background:var(--ink2); color:#e9e7db; border-radius:20px;
  padding:7px 13px; font-size:12.5px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px}
.pchip .dot{width:8px; height:8px; border-radius:50%; background:var(--gold)}
.pchip.p2 .dot{background:var(--olive-lt)}
.cchip{border:1px solid #3a3f2e; background:transparent; color:var(--mut2); border-radius:20px;
  padding:7px 11px; font-size:11px; font-weight:700; cursor:pointer; margin-right:8px}
.cchip.on{color:#9fd39b; border-color:rgba(79,138,77,.6)}
.cchip.connecting{color:var(--gold)}
.cchip.error{color:#e08770; border-color:rgba(181,86,63,.6)}
.tabs{display:flex; gap:16px; margin-top:10px; overflow-x:auto; scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{border:none; background:transparent; color:var(--mut2); cursor:pointer; flex:0 0 auto;
  font-family:var(--disp); font-weight:600; font-size:13.5px; letter-spacing:.7px; text-transform:uppercase;
  padding:8px 2px 12px; border-bottom:2.5px solid transparent}
.tabs button.on{color:#fff; border-bottom-color:var(--gold)}

main{background:var(--paper); color:var(--ink); border-radius:20px 20px 0 0; padding:16px 14px 8px; min-height:70vh; margin-top:0}

/* ---- Profile gate ---- */
.gate{padding:40px 18px 20px; text-align:center}
.gate h1{font-family:var(--disp); text-transform:uppercase; letter-spacing:1px; color:#fff; font-size:26px; margin:0 0 6px}
.gate p{color:var(--mut2); font-size:13px; margin:0 0 26px}
.pcards{display:flex; gap:14px; justify-content:center}
.pcard{flex:1; max-width:200px; background:var(--ink2); border:1px solid #3a3f2e; border-radius:18px;
  padding:26px 14px; cursor:pointer; color:#fff}
.pcard .avatar{width:58px; height:58px; margin:0 auto 12px; border-radius:50%; display:grid; place-items:center;
  font-family:var(--disp); font-size:24px; font-weight:700; background:var(--gold); color:#3a2c05}
.pcard.p2 .avatar{background:var(--olive-lt); color:#1e2413}
.pcard .nm{font-family:var(--disp); font-size:17px; letter-spacing:.5px}
.pcard .sub{font-size:11px; color:var(--mut2); margin-top:4px}
.pinbox{margin-top:26px}
.pinbox .nmfld{margin-bottom:12px}
.pinbox input{width:200px; text-align:center; border:1px solid #3a3f2e; background:var(--ink2); color:#fff;
  border-radius:12px; padding:12px; font-family:var(--mono); font-weight:700; font-size:18px; letter-spacing:6px}
.pinbox input.nm{letter-spacing:normal; font-family:var(--body); font-size:15px}
.pinbox input:focus{outline:none; border-color:var(--olive-lt)}
.pinbox .err{color:#e08770; font-size:12.5px; margin-top:10px; min-height:16px}
.gbtns{display:flex; gap:10px; justify-content:center; margin-top:16px}
.gbtns button{border:none; border-radius:12px; padding:12px 22px; font-family:var(--disp); font-weight:600;
  font-size:14px; letter-spacing:.5px; text-transform:uppercase; cursor:pointer}
.gbtns .go{background:var(--gold); color:#3a2c05}
.gbtns .back{background:var(--ink2); color:#cdcbbb}
.gcloud{margin-top:30px}
.gcloud button{border:1px dashed #3a3f2e; background:transparent; color:var(--mut2);
  border-radius:12px; padding:9px 16px; font-size:12px; font-weight:600; cursor:pointer}

/* ---- Dashboard ---- */
.hero{margin:2px 2px 16px}
.hero h2{font-family:var(--disp); text-transform:uppercase; font-size:20px; letter-spacing:.5px; margin:0; color:var(--ink)}
.hero p{margin:3px 0 0; font-size:12.5px; color:var(--mut)}
.ghead{margin:16px 4px 8px; font-family:var(--disp); font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--mut); border-bottom:1px dashed var(--line); padding-bottom:5px}
.progcard{background:#fff; border:1px solid var(--line); border-radius:16px; margin:0 2px 12px; padding:15px 16px; cursor:pointer}
.progcard .top{display:flex; align-items:center; gap:10px}
.progcard h3{margin:0; font-family:var(--disp); font-size:18px; letter-spacing:.4px; text-transform:uppercase; color:var(--ink); flex:1}
.progcard .tag{font-size:10px; letter-spacing:1.2px; text-transform:uppercase; font-weight:700;
  padding:4px 9px; border-radius:20px; background:rgba(91,106,61,.14); color:var(--olive-dk)}
.progcard .meta{margin-top:6px; font-size:12.5px; color:var(--mut)}
.progcard .meta.goal{margin-top:3px; color:#5a5c4e; font-weight:600; font-size:12px}
.progcard .stats{display:flex; gap:18px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line)}
.progcard .st .n{font-family:var(--mono); font-weight:700; font-size:15px; color:var(--olive-dk)}
.progcard .st .l{font-size:9.5px; letter-spacing:1px; text-transform:uppercase; color:var(--mut2)}
.progcard.active{border-color:var(--olive); box-shadow:0 0 0 1.5px var(--olive);
  background:linear-gradient(135deg, rgba(91,106,61,.12), rgba(216,165,49,.10)), #fff}
.ghead.now{color:var(--gold-dk); border-bottom-color:rgba(216,165,49,.5)}
.progcard .cont{margin-top:2px; font-size:11px; color:var(--gold-dk); font-weight:700; letter-spacing:.4px; text-transform:uppercase}

/* ---- Log controls ---- */
.controls{display:flex; align-items:flex-end; gap:10px; padding:2px 2px 4px}
.datefld{flex:1}
.datefld label{font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--mut); display:block; margin-bottom:4px}
.datefld input{width:100%; border:1px solid var(--line); background:#fff; color:var(--ink);
  border-radius:12px; padding:10px 12px; font-family:var(--mono); font-weight:700; font-size:15px}
.datefld input:focus{outline:none; border-color:var(--olive)}
.today{flex:0 0 auto; border:1px solid var(--line); background:var(--paper2); color:var(--ink);
  border-radius:10px; padding:11px; font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; cursor:pointer}
.weekbar{display:flex; align-items:center; gap:10px; padding:10px 2px 2px}
.wk-btn{width:40px; height:40px; flex:0 0 auto; border:1px solid var(--line); border-radius:12px;
  background:#fff; color:var(--ink); font-size:22px; line-height:1; display:grid; place-items:center; cursor:pointer}
.wk-info{flex:1; text-align:center}
.wk-info .w{font-family:var(--disp); font-size:21px; font-weight:600; color:var(--ink); letter-spacing:1px; line-height:1}
.badge{display:inline-block; margin-top:3px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
  padding:3px 9px; border-radius:20px; font-weight:700; background:rgba(91,106,61,.14); color:var(--olive-dk)}
.badge.b2{background:rgba(216,165,49,.18); color:var(--gold-dk)}
.badge.warn{background:rgba(216,165,49,.28); color:#7a5c10}
.days{display:flex; gap:8px; overflow-x:auto; padding:12px 2px 10px; scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day{flex:0 0 auto; border:1px solid var(--line); background:#fff; color:var(--ink);
  border-radius:14px; padding:9px 13px; cursor:pointer; text-align:left; min-width:86px}
.day .dl{font-size:10px; letter-spacing:1px; color:var(--mut2); text-transform:uppercase}
.day .dn{font-family:var(--disp); font-size:15.5px; font-weight:600; letter-spacing:.3px; margin-top:1px}
.day.on{background:var(--olive); border-color:var(--olive); color:#fff}
.day.on .dl{color:#dfe6c6}
.day.logged::after{content:'•'; float:right; color:var(--gold); font-weight:700; font-size:16px; margin-left:6px; line-height:.8}
.day.done::after{content:'✓'; float:right; color:var(--good); font-weight:700; font-size:13px; margin-left:6px}
.day.on.done::after,.day.on.logged::after{color:#dfe6c6}

.sheet-h{display:flex; align-items:center; justify-content:space-between; margin:6px 4px 12px}
.sheet-h h2{font-family:var(--disp); text-transform:uppercase; font-size:22px; letter-spacing:.5px; margin:0; color:var(--ink)}
.sheet-h .foc{font-size:11px; color:var(--mut); letter-spacing:1px; text-transform:uppercase}
.donebtn{border:1.5px solid var(--olive); background:transparent; color:var(--olive-dk);
  font-family:var(--disp); font-weight:600; font-size:13px; letter-spacing:.5px; text-transform:uppercase;
  padding:8px 12px; border-radius:11px; cursor:pointer; flex:0 0 auto}
.donebtn.on{background:var(--olive); color:#fff}
.restinfo{margin:0 2px 12px; font-size:11.5px; color:var(--mut); text-align:center; letter-spacing:.5px; text-transform:uppercase}
.restinfo.nextup{color:var(--good); background:rgba(79,138,77,.10); border:1px solid rgba(79,138,77,.35);
  border-radius:11px; padding:9px 12px; text-transform:none; letter-spacing:.2px}
.restinfo.nextup b{color:var(--olive-dk)}
/* general warm-up block */
.gwarm{border:1px dashed var(--line); border-radius:13px; margin:0 2px 12px; background:var(--paper2); overflow:hidden}
.gwarm summary{list-style:none; cursor:pointer; padding:11px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px}
.gwarm summary::-webkit-details-marker{display:none}
.gwarm summary span{font-family:var(--disp); font-size:13px; letter-spacing:.8px; text-transform:uppercase; color:var(--olive-dk); font-weight:600}
.gwarm .gv{text-decoration:none; background:#fff; color:var(--ink); border:1px solid var(--line);
  border-radius:9px; padding:6px 10px; font-size:11px; font-weight:700; flex:0 0 auto}
.gwck{border:1.5px solid var(--line); background:#fff; color:transparent; border-radius:9px;
  width:30px; height:30px; font-size:14px; cursor:pointer; padding:0; flex:0 0 auto}
.gwck.on{background:var(--good); border-color:var(--good); color:#fff}
.gwarm.on{background:rgba(79,138,77,.10); border-color:rgba(79,138,77,.45)}
.gwarm.on summary span{color:var(--good)}
.gwarm[open] summary{border-bottom:1px dashed var(--line)}
.gwarm .gw{padding:8px 14px 11px}
.gwrow{display:flex; gap:12px; padding:4px 0; font-size:13px; color:#4a4c40}
.gwrow b{font-family:var(--mono); font-size:12px; color:var(--olive-dk); min-width:70px}
.gwrow i{color:var(--mut)}

/* ---- Exercise card ---- */
.card{background:#fff; border:1px solid var(--line); border-radius:16px; margin:0 2px 12px; overflow:hidden}
.card.exdone{background:var(--paper2)}
.ctop{display:flex; gap:11px; padding:13px 14px 10px; align-items:flex-start}
.idx{font-family:var(--disp); font-weight:700; font-size:15px; color:#fff; background:var(--olive);
  min-width:26px; height:26px; border-radius:8px; display:grid; place-items:center; margin-top:1px}
.ctop .nm{flex:1; min-width:0}
.ctop .nm h3{margin:0; font-size:16.5px; font-weight:600; line-height:1.25; color:var(--ink)}
.exlink{cursor:pointer}
.exlink .hico{font-size:11px; opacity:.55}
.exlink:active{color:var(--olive-dk)}
.tgt{margin-top:4px; font-size:12.5px; color:var(--mut); font-family:var(--mono); font-weight:500; line-height:1.9}
.tgt .rpe{color:var(--olive-dk); font-weight:700}
/* RIR chips — green = plenty left, gold = getting hard, red = to failure */
.eff{font-family:var(--body); font-weight:700; font-size:11px; padding:2px 8px; border-radius:12px; white-space:nowrap}
.eff.e0{background:rgba(181,86,63,.16); color:var(--bad)}
.eff.e1{background:rgba(216,165,49,.24); color:#8a6414}
.eff.e2{background:rgba(216,165,49,.13); color:#7a6a20}
.eff.e3{background:rgba(79,138,77,.14); color:var(--good)}
.effsrc{font-size:10px; color:var(--mut2)}
.effarrow{font-size:10px; color:var(--mut)}
.wsets{margin-top:3px; font-size:11px; color:var(--olive-dk); letter-spacing:.4px; text-transform:uppercase; font-weight:700}
/* inline warm-up + set hints */
.scap{margin-top:11px; font-size:10px; letter-spacing:1.2px; text-transform:uppercase; font-weight:700;
  color:var(--mut2); border-bottom:1px dashed var(--line); padding-bottom:4px}
.scap b{color:var(--olive-dk)}
.slab.wu{color:var(--olive-lt)}
.slab.xs{color:var(--gold-dk)}
.srow[data-wu] input{background:#fff; border-style:dashed}
.srow.xrow input{background:rgba(216,165,49,.06); border-color:rgba(216,165,49,.5); border-style:dashed}
/* the last working set + its ★ rows are one continuous no-rest block — same gold look */
.srow.goldblock input{background:rgba(216,165,49,.06); border-color:rgba(216,165,49,.5)}
.srow.goldblock .slab{color:var(--gold-dk)}
input.auto{color:var(--mut2)} /* suggested (untouched) numbers look pale until confirmed */
/* max (1RM) line */
.maxline{margin-top:5px; font-size:11.5px; color:var(--mut); display:flex; align-items:center; gap:4px; flex-wrap:wrap}
.maxline .maxin{width:52px; border:1px solid var(--line); background:var(--paper); border-radius:8px;
  padding:4px 6px; font-family:var(--mono); font-weight:700; font-size:12.5px; color:var(--ink); text-align:center}
.maxline .maxin:focus{outline:none; border-color:var(--olive); background:#fff}
.maxline .mu{margin-left:-2px}
.maxline .arrw{color:var(--mut2); font-weight:700; margin:0 2px}
.maxline .sg{color:#5a5c4e}
.maxline .sg b{font-family:var(--mono); color:var(--gold-dk)}
.maxline .estl{font-size:9.5px; letter-spacing:.8px; text-transform:uppercase; font-weight:700; color:var(--good);
  border:1px solid rgba(79,138,77,.45); border-radius:8px; padding:1px 5px}
.maxline .estl.up{color:var(--gold-dk); border-color:rgba(216,165,49,.6); background:rgba(216,165,49,.12)}
.maxline.hist{color:var(--mut)}
.maxline.hist b{font-family:var(--mono); color:var(--olive-dk)}
.shint{margin:9px 0 -4px 30px; font-size:11px; color:var(--mut); line-height:1.35}
.shint b{color:var(--gold-dk)}
.shint.techline{margin-top:3px; color:#8a6414; font-weight:600}
.tech{margin:6px 14px 0; padding:7px 11px; background:rgba(216,165,49,.13); border:1px solid rgba(216,165,49,.5);
  border-radius:10px; font-size:12px; color:#6b5410; font-weight:600; line-height:1.45}
.tech .techx{font-weight:400; color:#7a6220}
.exdonebtn{flex:0 0 auto; border:1.5px solid var(--line); background:transparent; color:var(--mut);
  border-radius:10px; width:34px; height:34px; font-size:16px; cursor:pointer; line-height:1}
.exdonebtn.on{background:var(--olive); border-color:var(--olive); color:#fff}
/* video row */
.vids{display:flex; flex-wrap:wrap; gap:7px; padding:0 14px 4px}
.vids a{text-decoration:none; background:var(--paper2); color:var(--ink); border-radius:10px;
  padding:7px 10px; font-size:11.5px; font-weight:700; display:inline-flex; align-items:center; gap:5px}
.vids a svg{width:11px; height:11px; fill:var(--bad); flex:0 0 auto}
.vids a.alt{background:transparent; border:1px dashed var(--line); color:#4a4c40; font-weight:600}
.vids a.alt svg{fill:var(--mut2)}
.vids .altlbl{font-size:10px; color:var(--mut2); align-self:center; letter-spacing:.5px; text-transform:uppercase; font-weight:700}
/* notes */
.exnotes{margin:6px 14px 0; border:1px dashed var(--line); border-radius:10px; background:var(--paper)}
.exnotes summary{list-style:none; cursor:pointer; padding:7px 11px; font-size:11px; letter-spacing:.6px;
  text-transform:uppercase; font-weight:700; color:var(--olive-dk)}
.exnotes summary::-webkit-details-marker{display:none}
.exnotes div{padding:0 11px 9px; font-size:12.5px; line-height:1.55; color:#4a4c40}
/* sets */
.sets{padding:2px 14px 12px}
.srow{display:grid; grid-template-columns:22px 1fr 1fr 28px 22px; gap:7px; align-items:center; margin-top:8px}
.sck{border:1.5px solid var(--line); background:#fff; color:transparent; border-radius:8px;
  width:28px; height:28px; font-size:14px; line-height:1; cursor:pointer; padding:0}
.sck.on{background:var(--good); border-color:var(--good); color:#fff}
.srow.ckd input{background:rgba(79,138,77,.07); border-color:rgba(79,138,77,.35); color:var(--ink)}
.slab{font-family:var(--mono); font-size:12px; color:var(--mut2); font-weight:700}
.fld{position:relative}
.fld input{width:100%; border:1px solid var(--line); background:var(--paper); border-radius:10px;
  padding:11px 10px 11px 12px; font-family:var(--mono); font-weight:700; font-size:16px; color:var(--ink)}
.fld input:focus{outline:none; border-color:var(--olive); background:#fff}
.fld .u{position:absolute; right:9px; top:50%; transform:translateY(-50%); font-size:11px; color:var(--mut2); font-weight:600; pointer-events:none}
.rm{border:none; background:transparent; color:var(--mut2); font-size:20px; cursor:pointer; padding:0}
.addset{margin-top:9px; width:100%; border:1px dashed var(--line); background:transparent; color:var(--olive-dk);
  border-radius:10px; padding:9px; font-family:var(--disp); font-weight:600; font-size:13px; letter-spacing:.5px; cursor:pointer; text-transform:uppercase}
.last{margin:6px 14px 0; padding:8px 11px; background:var(--paper2); border-radius:10px;
  font-size:12px; color:#5a5c4e; display:flex; align-items:center; justify-content:space-between; gap:8px}
.last .lv{font-family:var(--mono); font-weight:700; color:var(--ink)}
.delta{font-family:var(--mono); font-weight:700; font-size:11.5px; padding:2px 7px; border-radius:20px}
.delta.up{background:rgba(216,165,49,.2); color:var(--gold-dk)}
.delta.eq{background:var(--paper); color:var(--mut)}
.delta.dn{background:rgba(181,86,63,.14); color:var(--bad)}
/* collapsed exercise */
.exsum{display:flex; align-items:center; gap:11px; padding:11px 14px; cursor:pointer}
.exsum .ck{color:var(--good); font-weight:700; font-size:15px}
.exsum .nm{flex:1; font-size:14.5px; font-weight:600; color:#4a4c40; text-decoration:line-through; text-decoration-color:rgba(91,106,61,.4); text-decoration-thickness:1.5px}
.exsum .best{font-family:var(--mono); font-weight:700; font-size:12.5px; color:var(--olive-dk)}

.foot{text-align:center; color:var(--mut); font-size:11px; padding:14px 20px 4px; line-height:1.6}
.foot b{color:var(--ink)}
.backup{display:flex; gap:10px; justify-content:center; margin:14px 0 8px}
.backup button{flex:1; max-width:170px; border:1px solid var(--olive); background:var(--olive-dk); color:#fff;
  font-family:var(--disp); font-weight:600; font-size:14px; letter-spacing:.5px; text-transform:uppercase;
  padding:12px; border-radius:12px; cursor:pointer}
.remind{margin:0 2px 12px; background:rgba(216,165,49,.14); border:1px solid var(--gold); border-radius:13px;
  padding:11px 13px; display:flex; align-items:center; gap:10px; color:#6b5410}
.remind span{flex:1; font-size:12.5px; line-height:1.4}
.remind button{border:none; background:var(--gold); color:#3a2c05; font-family:var(--disp); font-weight:700;
  font-size:12px; letter-spacing:.5px; text-transform:uppercase; padding:9px 12px; border-radius:9px; cursor:pointer; flex:0 0 auto}
.remind .x{background:transparent; color:#8a7a4a; font-size:18px; padding:0 4px}

/* ---- Calendar ---- */
.calhead{display:flex; align-items:center; gap:10px; padding:2px 2px 10px}
.calttl{flex:1; text-align:center}
.calttl .w{font-family:var(--disp); font-size:20px; font-weight:600; color:var(--ink); letter-spacing:1px; line-height:1.1}
.calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin:0 2px}
.caldow{margin-bottom:4px}
.caldow div{text-align:center; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--mut2); font-weight:700; padding:2px 0}
.cc{background:var(--paper2); border:1px solid var(--line); border-radius:9px; min-height:56px; padding:4px 5px; position:relative}
.cc.dim{opacity:.35}
.cc .cd{font-family:var(--mono); font-size:11px; font-weight:700; color:var(--mut)}
.cc.train{background:#fff; border-color:var(--olive-lt); cursor:pointer}
.cc.train .cd{color:var(--ink)}
.cc .cw{font-family:var(--disp); font-size:10.5px; font-weight:600; color:var(--olive-dk); line-height:1.15; margin-top:2px;
  overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical}
.cc .ck2{position:absolute; top:3px; right:5px; font-size:10px; font-weight:700; color:var(--mut2)}
.cc.done{background:rgba(79,138,77,.13); border-color:rgba(79,138,77,.55)}
.cc.done .ck2{color:var(--good); font-size:12px}
.cc.logged .ck2{color:var(--gold-dk); font-size:14px; line-height:.7}
.cc.today{box-shadow:0 0 0 2px var(--gold)}
.callegend{display:flex; gap:14px; justify-content:center; margin-top:12px; font-size:11px; color:var(--mut)}
.callegend .lg{display:inline-block; width:11px; height:11px; border-radius:3px; background:var(--paper2); border:1px solid var(--line); vertical-align:-1px; margin-right:4px}
.callegend .lg.train{background:#fff; border-color:var(--olive-lt)}
/* ---- Measure ---- */
.unittog{display:flex; gap:0; flex:0 0 auto; align-self:flex-end; border:1px solid var(--line); border-radius:10px; overflow:hidden}
.unittog button{border:none; background:#fff; color:var(--mut); padding:11px 10px; font-size:11px; font-weight:700; cursor:pointer}
.unittog button.on{background:var(--olive); color:#fff}
.mcard{background:#fff; border:1px solid var(--line); border-radius:16px; margin:12px 2px; padding:14px}
.mweight{display:flex; align-items:center; gap:12px; padding-bottom:12px; border-bottom:1px dashed var(--line)}
.mweight label{font-family:var(--disp); font-size:14px; letter-spacing:.6px; text-transform:uppercase; color:var(--olive-dk); font-weight:600; flex:1}
.mweight .fld.big{width:140px}
.mweight .fld.big input{font-size:20px; padding:12px 34px 12px 12px}
.mgrid{display:grid; grid-template-columns:1fr 1fr; gap:9px 12px; padding-top:12px}
.mfld label{display:block; font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:var(--mut); font-weight:700; margin-bottom:4px}
.mhint{margin-top:12px; font-size:11.5px; color:var(--mut); line-height:1.5}
.mhint b{color:#5a5c4e}
/* ---- History ---- */
.subtabs{display:flex; gap:8px; margin:2px 2px 14px}
.subtabs button{flex:1; border:1px solid var(--line); background:var(--paper2); color:var(--mut);
  font-family:var(--disp); font-weight:600; font-size:13px; letter-spacing:.5px; text-transform:uppercase;
  padding:10px; border-radius:11px; cursor:pointer}
.subtabs button.on{background:var(--olive); color:#fff; border-color:var(--olive)}
.exfilter{display:flex; align-items:center; gap:10px; margin:0 2px 12px; background:var(--olive); color:#fff;
  border-radius:12px; padding:10px 14px}
.exfilter span{flex:1; font-family:var(--disp); font-size:15px; font-weight:600; letter-spacing:.4px}
.exfilter button{border:none; background:rgba(255,255,255,.18); color:#fff; border-radius:9px;
  padding:7px 11px; font-size:11.5px; font-weight:700; cursor:pointer; flex:0 0 auto}
.setline{display:flex; flex-wrap:wrap; gap:5px; margin-top:5px}
.setpill{font-family:var(--mono); font-size:11.5px; font-weight:700; color:var(--ink);
  background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:3px 7px}
.setpill.wu{color:var(--mut); border-style:dashed; background:transparent}
.setpill.xs{color:var(--gold-dk); border-color:rgba(216,165,49,.55); border-style:dashed; background:rgba(216,165,49,.07)}
.slog{list-style:none; margin:0; padding:0}
.slog li{background:#fff; border:1px solid var(--line); border-radius:14px; margin:0 2px 10px;
  padding:12px 14px; display:flex; align-items:center; gap:12px; cursor:pointer}
.slog .sd{flex:1; min-width:0}
.slog .sd .dt{font-family:var(--disp); font-size:16px; font-weight:600; color:var(--ink); letter-spacing:.3px}
.slog .sd .meta{font-size:11.5px; color:var(--mut); margin-top:2px; font-family:var(--mono)}
.slog .vol{text-align:right; flex:0 0 auto}
.slog .vol .n{font-family:var(--mono); font-weight:700; font-size:16px; color:var(--olive-dk)}
.slog .vol .l{font-size:9.5px; letter-spacing:1px; text-transform:uppercase; color:var(--mut2)}
.slog .ck{flex:0 0 auto; color:var(--good); font-weight:700; font-size:16px; width:16px; text-align:center}
.expick{display:flex; flex-wrap:wrap; gap:7px; margin:0 2px 14px}
.expick button{border:1px solid var(--line); background:var(--paper2); color:#4a4c40;
  border-radius:20px; padding:7px 12px; font-size:12.5px; font-weight:600; cursor:pointer}
.expick button.on{background:var(--olive); color:#fff; border-color:var(--olive)}
.chartbox{background:#fff; border:1px solid var(--line); border-radius:16px; margin:0 2px 12px; padding:14px 10px 6px}
.chartbox h3{margin:0 4px 4px; font-size:15px; color:var(--ink)}
.chartbox .csub{margin:0 4px 8px; font-size:11.5px; color:var(--mut); font-family:var(--mono)}
.chartbox svg{width:100%; height:auto; display:block}
.progtbl{width:100%; border-collapse:collapse; font-size:13px; margin:0 2px}
.progtbl th,.progtbl td{padding:8px 10px; border-bottom:1px solid var(--line); text-align:left}
.progtbl th{font-family:var(--disp); letter-spacing:.5px; text-transform:uppercase; color:var(--olive-dk); font-size:11.5px}
.progtbl td{color:#4a4c40}
.progtbl td.n{font-family:var(--mono); font-weight:700; color:var(--ink)}
.empty{text-align:center; color:var(--mut); font-size:13px; padding:30px 16px; line-height:1.6}

/* ---- Knowledge ---- */
.ksec{background:#fff; border:1px solid var(--line); border-radius:16px; margin:0 2px 12px; overflow:hidden}
.ksec summary{list-style:none; cursor:pointer; padding:14px 16px; display:flex; align-items:center; gap:10px}
.ksec summary::-webkit-details-marker{display:none}
.ksec summary h3{margin:0; font-family:var(--disp); font-size:16px; letter-spacing:.5px; text-transform:uppercase; color:var(--ink); flex:1}
.ksec summary .pm{color:var(--mut2); font-weight:700}
.ksec .kc{padding:2px 16px 16px; font-size:13.5px; line-height:1.65; color:#4a4c40}
.ksec .kc b{color:var(--ink)}
.ksec .kc h4{font-family:var(--disp); text-transform:uppercase; letter-spacing:.5px; font-size:13px; color:var(--olive-dk); margin:16px 0 6px}
.cheat{width:100%; border-collapse:collapse; font-size:13px}
.cheat th,.cheat td{text-align:left; padding:6px 8px; border-bottom:1px solid var(--line)}
.cheat th{font-family:var(--disp); letter-spacing:.5px; text-transform:uppercase; color:var(--olive-dk); font-size:12px}
.cheat td:first-child{font-family:var(--mono); font-weight:700; color:var(--ink); white-space:nowrap}
.cheat tr:last-child td{border-bottom:none}
.ksearch{width:100%; border:1px solid var(--line); background:#fff; border-radius:12px; padding:11px 13px;
  font-size:14px; margin:0 0 10px; color:var(--ink)}
.ksearch:focus{outline:none; border-color:var(--olive)}
.cue{border-bottom:1px solid var(--paper2); padding:9px 2px}
.cue .cn{font-weight:600; font-size:13.5px; color:var(--ink); display:flex; align-items:center; gap:7px; flex-wrap:wrap}
.cue .cn .cprog{font-size:9.5px; letter-spacing:1px; text-transform:uppercase; color:var(--mut2); font-weight:700}
.cue .ct{font-size:12.5px; color:#5a5c4e; margin-top:3px; line-height:1.5}
.cue a{color:var(--olive-dk); font-weight:700; text-decoration:none; font-size:12px}


/* ---- Readability polish: darker secondary text, sections that pop ---- */
:root{--mut:#5c5e4a; --mut2:#82836d; --line:#c9c5b0}

<script>
/* ================= STORAGE ================= */
const mem = {};
const rawStore = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return (k in mem)?mem[k]:null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } },
  remove(k){ try{ localStorage.removeItem(k); }catch(e){ delete mem[k]; } },
  keys(pfx){ const o=[]; try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(pfx)) o.push(k);} }
    catch(e){ Object.keys(mem).forEach(k=>{ if(k.startsWith(pfx)) o.push(k); }); } return o; }
};
/* store = rawStore + cloud sync hooks (see CLOUD SYNC section) */
const store = {
  get:rawStore.get,
  set(k,v){ rawStore.set(k,v); cloudTouch(k,String(v)); },
  remove(k){ rawStore.remove(k); cloudTouch(k,null); },
  keys:rawStore.keys,
};
/* ================= CLOUD SYNC (Firebase Firestore) =================
   localStorage stays the source of truth on-device; every synced key is mirrored to
   Firestore with a last-write-wins timestamp. Works fully offline when no config is set. */
const FB_SDK_V='10.12.2';
const HOUSE='main';                              // one shared data tree for the household
const DEVICE=(function(){ let d=rawStore.get('g2:device'); if(!d){ d='d'+Math.random().toString(36).slice(2,10); rawStore.set('g2:device',d); } return d; })();
const NOSYNC=['g2:fbconfig','g2:syncts','g2:active','g2:device','g2:migrated','g2:remind-hide'];
const syncable=k=>k.startsWith('g2:')&&!NOSYNC.includes(k);
let fbdb=null, fbStatus='off';                   // off | connecting | on | error
let MT={}; try{ MT=JSON.parse(rawStore.get('g2:syncts')||'{}'); }catch(e){}
let mtDirty=false;
setInterval(()=>{ if(mtDirty){ mtDirty=false; rawStore.set('g2:syncts',JSON.stringify(MT)); } },1500);
const pushTimers={};
function cloudTouch(k,v){
  if(!syncable(k)) return;
  MT[k]=Date.now(); mtDirty=true;
  if(!fbdb) return;
  clearTimeout(pushTimers[k]);
  pushTimers[k]=setTimeout(()=>pushKey(k),700);   // debounce rapid typing
}
function kvRef(){ return fbdb.collection('h').doc(HOUSE).collection('kv'); }
function pushKey(k){
  if(!fbdb) return;
  const v=rawStore.get(k);
  const doc=kvRef().doc(k);
  (v==null ? doc.set({del:1,t:MT[k]||Date.now(),d:DEVICE})
           : doc.set({v:v,t:MT[k]||Date.now(),d:DEVICE}))
    .catch(()=>{});                               // reconciled on next startup
}
function applyRemote(k,data){
  if(!syncable(k)) return false;
  const lt=MT[k]||0;
  if(!(data.t>lt)) return false;
  if(data.del) rawStore.remove(k); else rawStore.set(k,data.v);
  MT[k]=data.t; mtDirty=true;
  return true;
}
async function pullCloud(){
  const snap=await kvRef().get();
  const cloud={};
  snap.forEach(d=>{ cloud[d.id]=d.data(); applyRemote(d.id,d.data()); });
  // push local keys the cloud doesn't have (or has older)
  rawStore.keys('g2:').forEach(k=>{
    if(!syncable(k)) return;
    const ct=(cloud[k]||{}).t||0;
    if((MT[k]||1)>ct){ MT[k]=MT[k]||Date.now(); pushKey(k); }
  });
  mtDirty=true;
}
function watchCloud(){
  kvRef().onSnapshot(snap=>{
    let changed=false;
    snap.docChanges().forEach(ch=>{
      const data=ch.doc.data();
      if(data.d===DEVICE) return;                 // our own echo
      if(applyRemote(ch.doc.id,data)) changed=true;
    });
    if(changed){
      profiles=getProfiles();
      // refresh quietly unless the user is typing in the log
      const typing=document.activeElement&&document.activeElement.tagName==='INPUT';
      if(activeP&&!typing&&view!=='log') switchView(view);
    }
  },()=>{});
}
function fbConfig(){
  try{ const r=rawStore.get('g2:fbconfig'); if(r) return JSON.parse(r); }catch(e){}
  return window.FIREBASE_CONFIG||null;
}
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
async function initCloud(){
  const cfg=fbConfig();
  if(!cfg){ fbStatus='off'; paintCloud(); return; }
  fbStatus='connecting'; paintCloud();
  try{
    if(!window.firebase){
      const base='https://www.gstatic.com/firebasejs/'+FB_SDK_V+'/';
      await loadScript(base+'firebase-app-compat.js');
      await loadScript(base+'firebase-auth-compat.js');
      await loadScript(base+'firebase-firestore-compat.js');
    }
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    await firebase.auth().signInAnonymously();
    fbdb=firebase.firestore();
    await pullCloud();
    watchCloud();
    fbStatus='on'; paintCloud();
    if(activeP){ profiles=getProfiles(); if(view!=='log') switchView(view); }
  }catch(e){ console.error('cloud init failed',e); fbStatus='error'; paintCloud(); }
}
function paintCloud(){
  const c=$('#cloudChip'); if(!c) return;
  c.className='cchip '+fbStatus;
  c.title={off:'Cloud sync: not set up — tap to connect',connecting:'Cloud sync: connecting…',
           on:'Cloud sync: on — data syncs across devices',error:'Cloud sync: error — tap to retry / re-enter config'}[fbStatus];
  c.textContent={off:'☁ off',connecting:'☁ …',on:'☁ on',error:'☁ !'}[fbStatus];
}
function cloudSetup(){
  const cur=rawStore.get('g2:fbconfig')||'';
  const inp=prompt(
    'Paste your Firebase config here as JSON.\n'+
    'From console.firebase.google.com → Project settings → Your apps → Web app → the firebaseConfig object.\n'+
    'Example: {"apiKey":"...","authDomain":"...","projectId":"...","appId":"..."}\n'+
    '(Leave empty and press OK to disconnect.)', cur);
  if(inp===null) return;
  const t=inp.trim();
  if(!t){ rawStore.remove('g2:fbconfig'); fbdb=null; fbStatus='off'; paintCloud(); return; }
  try{
    // tolerate a pasted "const firebaseConfig = {...};" snippet
    let cfg=null;
    try{ cfg=JSON.parse(t); }catch(_){
      let j=t.replace(/^[^{]*/,'').replace(/[^}]*$/,'');   // keep only {...}
      j=j.replace(/'([^']*)'/g,'"$1"');                    // single -> double quoted values
      j=j.replace(/([{,]\s*)([A-Za-z_]\w*)\s*:/g,'$1"$2":'); // quote bare keys (only after { or ,)
      cfg=JSON.parse(j);
    }
    if(!cfg.apiKey||!cfg.projectId) throw new Error('missing fields');
    rawStore.set('g2:fbconfig',JSON.stringify(cfg));
    initCloud();
  }catch(e){ alert('Could not read that config. Copy the whole {...} object from Firebase console and try again.'); }
}

const fmtLong=s=>{const d=parseDate(s); return WD[d.getDay()]+', '+MON[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();};
const makeRows=n=>Array.from({length:Math.max(1,n|0)},()=>({kg:'',reps:''}));
function topSet(sets){ let b=null; (sets||[]).forEach(s=>{const k=parseFloat(s.kg); if(!isNaN(k)&&(b===null||k>b.kg)) b={kg:k,reps:s.reps};}); return b; }
const topKg=sets=>{const t=topSet(sets); return t?t.kg:null;};
const hasData=sets=>(sets||[]).some(s=>str(s.kg)!==''||str(s.reps)!=='');
function sessionVolume(x){ let v=0; x.entries.forEach(e=>e.sets.forEach(s=>{const k=parseFloat(s.kg),r=parseFloat(s.reps); if(!isNaN(k)&&!isNaN(r)) v+=k*r;})); return v; }
/* weekly field: scalar or 12-array */
const wv=(f,w)=>Array.isArray(f)?f[w-1]:f;

/* ---- warm-up pyramid (from the PDFs' warm-up protocol) ---- */
const WU_PYRAMID={
  1:[[60,'6–10']],
  2:[[50,'6–10'],[70,'4–6']],
  3:[[45,'6–10'],[65,'4–6'],[85,'3–4']],
  4:[[45,'6–10'],[60,'4–6'],[75,'3–5'],[85,'2–4']],
};
function wuRange(label){ // "1-2" -> [1,2], "2" -> [2,2], "0-1" -> [0,1]
  const m=String(label||'').match(/(\d+)\s*[-–]\s*(\d+)/);
  if(m) return [+m[1],+m[2]];
  const n=parseInt(label); return isNaN(n)?[1,1]:[n,n];
}
function getStep(){
  try{ const v=parseFloat(store.get(['g2',activeP.id,'step'].join(':')));
    if(v>0&&v<=20) return v; }catch(e){}
  return 2.5;
}
const round25=x=>{ const s=(activeP?getStep():2.5); return +(Math.round(x/s)*s).toFixed(2); };

/* ---- working weight: the kg you lift for your working sets (S1, S2…) ----
   The user enters it directly — warm-ups are percentages of it. Per profile, shared across programs. */
const workKey=ex=>['g2',activeP.id,'work',ex].join(':');
const legacyMaxKey=ex=>['g2',activeP.id,'max',ex].join(':');
function getWork(ex){
  let v=parseFloat(store.get(workKey(ex)));
  if(isNaN(v)) v=parseFloat(store.get(legacyMaxKey(ex))); // earlier builds stored it as "max"
  return isNaN(v)?null:v;
}
const workTsKey=ex=>['g2',activeP.id,'workt',ex].join(':');
function getWorkTs(ex){ const v=parseFloat(store.get(workTsKey(ex))); return isNaN(v)?0:v; }
function setWork(ex,v){
  const n=parseFloat(v);
  store.remove(legacyMaxKey(ex));
  if(isNaN(n)||n<=0){ store.remove(workKey(ex)); store.remove(workTsKey(ex)); }
  else { store.set(workKey(ex),String(n)); store.set(workTsKey(ex),String(Date.now())); }
}
/* target RIR (last set) of an exercise on a given program week/day */
function rirTargetOf(name,w,d){
  try{
    const ex=dayExercises(pid,w,d).find(x=>x.name===name);
    if(!ex||!ex.eff||ex.eff.left==null) return null;
    return String(ex.eff.last!=null?ex.eff.last:ex.eff.left);
  }catch(e){ return null; }
}
/* A session done at target RIR 0 IS a max test: its top set defines the new Max. */
function autoMaxInfo(name){
  for(const s of listSessions()){ // newest first
    const e=s.entries.find(x=>x.exName===name);
    if(!e) continue;
    const t=topSet(e.sets); if(!t) continue;
    if(rirTargetOf(name,s.week,s.dayId)==='0'){
      // when this session was last written (wall clock), so a later manual edit can override it
      const wts=MT[SKEY(s.date)]||parseDate(s.date).getTime();
      return {kg:t.kg, ts:wts, date:s.date};
    }
  }
  return null;
}
/* effective Max = newest evidence: RIR-0 session vs manual entry (whichever is more recent) */
function effMaxOf(e){
  const man=getWork(e.name), mts=getWorkTs(e.name);
  const am=autoMaxInfo(e.name);
  if(am&&(man==null||am.ts>mts)) return {val:am.kg, auto:true, date:am.date};
  return man!=null?{val:man, auto:false}:null;
}
/* Max = the weight where you fail within the rep range (RIR 0).
   Easier weeks (higher target RIR) need less weight for the same reps:
   e1RM = max×(1+reps/30)  ->  weight = e1RM/(1+(reps+RIR)/30).  RIR 0 -> exactly Max. */
function effTargetRir(e){
  const f=e.eff||{};
  const v=(f.last!=null?f.last:f.left);
  if(v==null) return null;
  const nums=String(v).match(/\d+(?:\.\d+)?/g);
  if(!nums) return null;
  return nums.map(parseFloat).reduce((a,b)=>a+b,0)/nums.length;
}
/* Max = the user's 10-rep max (one simple question for every exercise).
   Convert 10RM -> e1RM -> this week's load for (rep range top + target RIR). */
function workTarget(e){
  const em=effMaxOf(e); if(!em) return null;
  const m=em.val;                                   // 10RM guess
  const mt=String(e.reps||'').match(/(\d+)(?!.*\d)/); // top of the rep range
  const rt=mt?parseInt(mt[1]):null;
  if(!rt) return m;
  const rir=effTargetRir(e)||0;
  const e1=m*(1+10/30);
  const v=round25(e1/(1+(rt+rir)/30));
  return v>0?v:m;
}

/* ---- RIR chips: one concept everywhere — how many reps you keep ---- */
function rirSeg(v){
  const s=String(v);
  const lo=parseFloat(s);
  const cls='e'+Math.min(3,Math.max(0,Math.round(isNaN(lo)?3:lo)));
  if(s==='0') return `<span class="eff e0">RIR 0 · to failure 🔥</span>`;
  return `<span class="eff ${cls}">RIR ${esc(s)} · keep ${esc(s)} rep${s==='1'?'':'s'}</span>`;
}
function effChip(e){
  const f=e.eff;
  if(!f||f.left==null) return `<span class="rpe">${esc(e.intensity)}</span>`;
  let h=rirSeg(f.left);
  if(f.last!=null&&String(f.last)!==String(f.left)) h+=`<span class="effarrow"> → last set </span>${rirSeg(f.last)}`;
  if(f.src) h+=` <span class="effsrc">(${esc(f.src)})</span>`;
  return h;
}
/* range note for the working-sets caption: '2-3' -> explain the extra rows */
function wsRangeNote(e){
  const wsl=String(e.wsLabel||e.ws);
  if(/\d\s*[–-]\s*\d/.test(wsl)) return ` · program says ${esc(wsl)} sets — unused rows drop when you ✓ done`;
  return '';
}
/* last-set intensity techniques — one-line how-to (definitions from the PDFs) */
function techExplain(t){
  const s=String(t||'').toLowerCase();
  if(/mechanical drop/.test(s)) return 'at failure, switch to an easier variation of the same movement (grip/angle) and keep repping — same weight.';
  if(/two drop/.test(s)) return 'at failure, strip ~25% and go to failure again — twice (3 back-to-back sets).';
  if(/drop ?set/.test(s)) return 'at failure, strip ~25% of the weight and go straight to failure again.';
  if(/integrated partial/.test(s)) return 'on every set: when full reps get impossible, keep repping only the stretched half until failure.';
  if(/lengthened|long-length|llp/.test(s)) return 'after full-ROM failure, keep repping only the stretched half of the movement until you fail again.';
  if(/myo/.test(s)) return 'go to failure, rest 5s, squeeze out 2 reps — repeat 5s + 2 reps until you can’t get 2 full reps.';
  if(/static hold/.test(s)) return 'after the last rep, hold the stretched bottom position under load for ~30 seconds.';
  if(/static stretch/.test(s)) return 'right after the last set, hold a weighted stretch of that muscle for ~30 seconds.';
  if(/failure/.test(s)) return 'take the last set all the way to failure' + (/llp|extend/.test(s)?', then add stretched-half partial reps.':'.');
  return '';
}
/* per-set instruction above each input row — always in RIR (reps you keep).
   With a progression plan we show THIS week's exact rep target instead of the range. */
function setHint(e, si, total, plan){
  const last=si>=total-1;
  const f=e.eff||{};
  const tgt=(plan&&plan.reps&&plan.reps[si]!=null)?`<b>${plan.reps[si]}</b> reps`:`${esc(e.reps)} reps`;
  const say=v=>String(v)==='0'?'<b>RIR 0</b> — all out, to failure 🔥':`<b>RIR ${v}</b> — stop with ${v} rep${String(v)==='1'?'':'s'} left`;
  if(f.left!=null){
    // when the program gives one target (365's RPE = last set), early sets go ~1 rep easier
    const lastV=(f.last!=null?f.last:f.left);
    const early=(f.last!=null)?f.left:f.left+(total>1?1:0);
    if(total<=1) return `${tgt} · ${say(lastV)}`;
    if(!last) return `${tgt} · ${say(early)}`;
    return `${tgt} · last set: ${say(lastV)}`;
  }
  if(!last&&total>1) return `${tgt} · slightly easier than the last set`;
  return `${tgt} · <b>${esc(e.intensity)}</b>${total>1?' — hardest set':''}`;
}

/* ================= PROGRAM ADAPTER =================
   uniform view over 365 (block-based), Min-Max (day-based) and plan programs (phase/block-based) */
function planBlock(P,week){ return P.plan.find(b=>week>=b.from&&week<=b.to)||P.plan[0]; }
function dayList(pid,week){
  const P=PROGRAMS[pid];
  if(P.plan) return planBlock(P,week||1).days.map(d=>({id:d.id, name:d.name}));
  return P.dayIds.map(id=>({id, name:P.dayNames[id]}));
}
/* RPE string -> RIR string: '~7-8' -> '2-3', '10' -> '0' */
function rpeToRirStr(s){
  if(s==null) return null;
  const nums=String(s).match(/\d+(?:\.\d+)?/g); if(!nums) return null;
  const rirs=nums.map(n=>Math.max(0,10-parseFloat(n)));
  const lo=Math.min(...rirs), hi=Math.max(...rirs);
  return lo===hi?String(+lo.toFixed(1)):(+lo.toFixed(1))+'–'+(+hi.toFixed(1));
}
function effFrom(intensity,e1,e2){
  if(intensity==='rir') return {left:e1, last:e2, src:null, label:'RIR '+e1+(e2!=null?' → '+e2:'')};
  const r1=rpeToRirStr(e1), r2=rpeToRirStr(e2);
  const src='RPE '+(e1||'')+(e2&&e2!==e1?' → '+e2:'');
  if(intensity==='rpe1'||e2==null) return {left:r1, last:null, src, label:src};
  return {left:r1, last:r2, src, label:src};
}
function blockOf365(w){ return w<=5?'Foundation':'Ramping'; }
/* '2-4' -> 4 : always pre-create rows for the top of a set range */
const topOfRange=v=>{ const m=String(v||'').match(/(\d+)\s*[–-]\s*(\d+)/); if(m) return +m[2]; const n=parseInt(v); return isNaN(n)?1:n; };
function ws365(P,week){ return topOfRange(P.workingSetsByWeek[String(week)]); }
/* returns rendered exercise descriptors for (pid, week, dayId) */
function dayExercises(pid, week, dayId){
  const P=PROGRAMS[pid];
  if(P.plan){
    const blk=planBlock(P,week), wIdx=week-blk.from+1; // 1-based within block
    const day=blk.days.find(d=>d.id===dayId)||blk.days[0];
    const out=[];
    day.exercises.forEach(e=>{
      const ws=wv(e.weekly.ws,wIdx);
      if(ws==null) return; // exercise not scheduled this week
      const wu=wv(e.weekly.wu,wIdx), reps=wv(e.weekly.reps,wIdx);
      const eff=effFrom(P.intensity, wv(e.weekly.eff1,wIdx), wv(e.weekly.eff2,wIdx));
      out.push({
        name:e.name, video:e.video, sub1:e.sub1, sub2:e.sub2, notes:e.notes,
        reps:(reps==null||reps==='N/A')?'—':reps, rest:e.rest, wu:wu, ws:topOfRange(ws),
        wsLabel:ws, intensity:eff.label, tech:wv(e.weekly.tech,wIdx),
        eff:{left:eff.left, last:eff.last, src:eff.src},
      });
    });
    return out;
  }
  if(pid==='jn365'){
    const blk=blockOf365(week);
    const day=P.workouts[blk][dayId];
    return day.exercises.map((e,i)=>{
      const rpeNum=parseFloat(String(e.rpe).replace(/[^\d.]/g,''));
      const wsv=String(P.workingSetsByWeek[String(week)]);
      return {
        name:e.name, video:e.video, sub1:e.sub1, sub2:e.sub2, notes:e.notes,
        reps:e.reps, rest:e.rest, wu:e.wu, ws:ws365(P,week), wsLabel:wsv,
        intensity:'RPE '+e.rpe, tech:null,
        eff:{left:isNaN(rpeNum)?null:Math.max(0,Math.round(10-rpeNum)), last:null, src:'RPE '+e.rpe},
      };
    });
  }
  const day=P.days.find(d=>d.id===dayId);
  return day.exercises.map(e=>{
    const ws=wv(e.weekly.ws,week), wu=wv(e.weekly.wu,week), reps=wv(e.weekly.reps,week);
    const r1=wv(e.weekly.rir1,week), r2=wv(e.weekly.rir2,week);
    let rir; if(r2==null||r2==='N/A') rir='RIR '+r1; else rir='RIR '+r1+' → '+r2+' (last set)';
    const r1n=parseFloat(r1), r2n=(r2==null||r2==='N/A')?NaN:parseFloat(r2);
    return {
      name:e.name, video:e.video, sub1:e.sub1, sub2:e.sub2, notes:e.notes,
      reps:(reps==='N/A'?'—':reps), rest:e.rest, wu:wu, ws:topOfRange(ws),
      wsLabel:ws, intensity:rir, tech:wv(e.weekly.tech,week),
      rir1:r1, rir2:(r2==null||r2==='N/A')?null:r2,
      eff:{left:isNaN(r1n)?null:r1n, last:isNaN(r2n)?null:r2n, src:null},
    };
  });
}
function dayMeta(pid, week, dayId){
  const P=PROGRAMS[pid];
  if(P.plan){
    const blk=planBlock(P,week);
    const day=blk.days.find(d=>d.id===dayId)||blk.days[0];
    return {title:day.name, focus:P.short+' · '+blk.name, banner:(P.banners||{})[String(week)]||null,
      block:blk.name, restAfter:day.restAfter||null};
  }
  if(pid==='jn365'){
    const blk=blockOf365(week);
    const day=P.workouts[blk][dayId];
    return {title:day.name, focus:day.focus, banner:null, block:blk, restAfter:null};
  }
  const day=P.days.find(d=>d.id===dayId);
  return {title:day.name, focus:P.short+' · Week '+week, banner:(P.banners||{})[String(week)]||null,
    block:null, restAfter:day.restAfter};
}

/* ================= PROFILES ================= */
function getProfiles(){
  const r=store.get('g2:profiles');
  if(r){ try{ return JSON.parse(r); }catch(e){} }
  return [{id:'p1',name:'',pin:''},{id:'p2',name:'',pin:''}];
}
function saveProfiles(ps){ store.set('g2:profiles', JSON.stringify(ps)); }
let profiles=getProfiles();
let activeP=null; // profile object

/* ================= STATE ================= */
let view='home';
let pid=null;               // current program id
let week=1, dayId='D1', curDate=todayStr();
let S=null;                 // in-memory session
let openSet=new Set();      // temporarily expanded done-exercises
let histEx=null; // exercise selected in History

const K=(...parts)=>['g2',activeP.id,...parts].join(':');
const SKEY=date=>K(pid,'session',date);

/* ================= SESSIONS ================= */
function getSaved(date){ const r=store.get(SKEY(date)); if(r){try{return JSON.parse(r)}catch(e){}} return null; }
function listSessions(p){
  const pfx=['g2',activeP.id,p||pid,'session',''].join(':');
  return store.keys(pfx).map(k=>{try{return JSON.parse(store.get(k))}catch(e){return null}})
    .filter(Boolean).sort((a,b)=>a.date<b.date?1:(a.date>b.date?-1:0));
}
function wuCount(e){ const [,hi]=wuRange(e.wu); return Math.min(4,Math.max(0,hi)); }
const bottomReps=r=>{ const m=String(r||'').match(/\d+/); return m?m[0]:''; };
const repRange=r=>{ const m=String(r||'').match(/(\d+)\s*[–-]\s*(\d+)/); if(m) return [+m[1],+m[2]]; const n=parseInt(r); return isNaN(n)?null:[n,n]; };
/* full previous entry (all sets) for an exercise before `date` */
function prevEntryOf(name,date){
  for(const s of listSessions()){
    if(s.date>=date) continue;
    const e=s.entries.find(x=>x.exName===name);
    if(e&&(e.sets||[]).some(t=>str(t.kg)!==''||str(t.reps)!=='')) return {e, week:s.week, dayId:s.dayId, date:s.date};
  }
  return null;
}
/* Today's exact plan for an exercise — Jeff's DOUBLE PROGRESSION vs the last session:
   - a set below the top of the rep range -> same weight, +1 rep on the first such set
   - ALL sets at the top of the range   -> +2.5 kg, reps reset to the bottom
   - deload/intro weeks                 -> repeat last numbers, no push
   Returns {kg, reps:[per set], mode:'up'|'push'|'repeat'|'fresh'} or null. */
function progressionPlan(e, date, w, nSets){
  const rng=repRange(e.reps);
  const pe=prevEntryOf(e.name,date);
  const easy=/deload|intro/i.test(String((PROGRAMS[pid].banners||{})[String(w)]||''));
  if(pe&&rng){
    const [lo,hi]=rng;
    const prevSets=pe.e.sets.filter(t=>str(t.kg)!==''||str(t.reps)!=='');
    const kgs=prevSets.map(t=>parseFloat(t.kg)).filter(n=>!isNaN(n));
    if(kgs.length){
      const prevKg=Math.max(...kgs);
      const repsArr=prevSets.map(t=>parseInt(t.reps));
      const maxedAll=repsArr.length>0&&repsArr.every(r=>!isNaN(r)&&r>=hi);
      if(maxedAll&&!easy)
        return {kg:round25(prevKg+getStep()), reps:Array.from({length:nSets},()=>lo), mode:'up'};
      let bumped=easy;                                     // no push on deload/intro weeks
      const reps=Array.from({length:nSets},(_,i)=>{
        const valid=repsArr.filter(r=>!isNaN(r));
        const pr=(i<repsArr.length&&!isNaN(repsArr[i]))?repsArr[i]:(valid.length?valid[valid.length-1]:lo);
        let t=Math.min(Math.max(pr,lo),hi);
        if(!bumped&&t<hi){ t+=1; bumped=true; }            // add a rep to the first set below the top
        return t;
      });
      return {kg:prevKg, reps, mode:easy?'repeat':'push'};
    }
  }
  const kg=(pe?topKg(pe.e.sets):null)||workTarget(e);      // fallback: Max field (scaled by target RIR)
  const lo=rng?rng[0]:(parseInt(bottomReps(e.reps))||null);
  if(!kg) return lo!=null?{kg:null, reps:Array.from({length:nSets},()=>lo), mode:'fresh'}:null; // reps target even without a kg anchor
  return {kg, reps:Array.from({length:nSets},()=>lo), mode:'fresh'};
}
/* how many extension (★) rows a technique needs under the last set */
function techSlots(t){
  if(!t) return 0;
  return /two drop/i.test(t)?2:1;
}
/* keep the ★ rows in sync with the last working set's weight (per technique rule).
   Only rows the user hasn't hand-edited (flagged .a, or still empty) get updated. */
function refreshXsets(entry, e){
  if(!(entry.xsets||[]).length) return false;
  let base=parseFloat(entry.sets[entry.sets.length-1].kg);
  if(isNaN(base)) base=topKg(entry.sets);
  if(base==null||isNaN(base)) return false;
  const t=e.tech||'';
  let changed=false;
  const put=(s,val)=>{ if(s.a||str(s.kg)===''){ const v=String(val); if(s.kg!==v){ s.kg=v; changed=true; } s.a=1; } };
  if(/drop/i.test(t)&&!/mechanical/i.test(t)){          // drop sets: −25% chain from the last set
    let k=base;
    entry.xsets.forEach(s=>{ k=round25(k*0.75); put(s,k); });
  } else {                                              // partials / myo-reps / mechanical / holds: SAME weight
    entry.xsets.forEach(s=>put(s,base));
  }
  if(/static/i.test(t)) entry.xsets.forEach(s=>{ if((s.a||str(s.reps)==='')&&s.reps!=='30'){ s.reps='30'; changed=true; } }); // 30-second hold
  return changed;
}
/* Pre-fill an untouched entry with the plan (shown pale in the UI).
   _auto entries are NOT saved until the user touches the exercise or marks it done. */
function prefillEntry(entry, e, date, w){
  if(entry.done||hasData(entry.sets)||hasData(entry.wsets)) return;
  const plan=progressionPlan(e, date, w, entry.sets.length);
  if(!plan) return;
  if(plan.kg==null){ // no kg anchor yet: still pre-fill the exact rep targets
    entry.sets.forEach((s,i)=>{ s.reps=plan.reps[i]!=null?String(plan.reps[i]):''; s.a=1; });
    entry._auto=true; return;
  }
  entry.sets.forEach((s,i)=>{ s.kg=String(plan.kg); s.reps=plan.reps[i]!=null?String(plan.reps[i]):''; s.a=1; }); // a = auto-suggested row
  const n=entry.wsets.length;
  entry.wsets.forEach((s,si)=>{ const p=(WU_PYRAMID[n]||[])[si];
    if(p){ s.kg=String(round25(plan.kg*p[0]/100)); s.reps=bottomReps(p[1]); } });
  refreshXsets(entry, e);                                // pre-fill the ★ rows per technique
  entry._auto=true;
}
/* on ✓ done: drop suggested rows the user never touched — keep only what was really lifted.
   (If nothing at all was touched, the whole plan is accepted as-is.) */
function finishExercise(entry){
  if(!entry.sets.some(s=>s.ck||!s.a)) return;             // wholesale accept
  if(entry.sets.some(s=>s.a&&!s.ck)){
    const kept=entry.sets.filter(s=>!s.a||s.ck);
    if(kept.length) entry.sets=kept;
  }
}
function buildSession(date, w, d, savedEntries, done, gw){
  const exs=dayExercises(pid,w,d);
  const entries=exs.map((e,i)=>{
    const sv=savedEntries&&savedEntries.find(s=>s.exName===e.name);
    const sets=(sv&&sv.sets&&sv.sets.length)?sv.sets.map(s=>({kg:str(s.kg),reps:str(s.reps),ck:s.ck?1:0,a:s.a?1:0})):makeRows(e.ws);
    // warm-up rows: fixed slots (index = pyramid step), merge any saved values
    const nWu=wuCount(e);
    const wsets=Array.from({length:nWu},(_,si)=>{
      const s=(sv&&sv.wsets&&sv.wsets[si])||{};
      return {kg:str(s.kg), reps:str(s.reps), ck:s.ck?1:0};
    });
    // ★ extension rows (drop sets / partials / holds after the last working set)
    const xsets=Array.from({length:techSlots(e.tech)},(_,si)=>{
      const s=(sv&&sv.xsets&&sv.xsets[si])||{};
      return {kg:str(s.kg), reps:str(s.reps), ck:s.ck?1:0};
    });
    const entry={exName:e.name, done:!!(sv&&sv.done), sets, wsets, xsets};
    prefillEntry(entry, e, date, w);
    return entry;
  });
  return {date, program:pid, week:w, dayId:d, done:!!done, gw:gw?1:0, entries};
}
function commit(){
  const anyCk=e=>e.sets.some(s=>s.ck)||e.wsets.some(s=>s.ck)||(e.xsets||[]).some(s=>s.ck);
  const pruned=S.entries.filter(e=>(!e._auto||e.done)&&(hasData(e.sets)||hasData(e.wsets)||hasData(e.xsets)||anyCk(e)||e.done))
    .map(e=>({exName:e.exName, done:e.done,
      sets:e.sets.filter(s=>str(s.kg)!==''||str(s.reps)!==''||s.ck).map(s=>({kg:str(s.kg),reps:str(s.reps),ck:s.ck?1:0,a:s.a?1:0})),
      // keep warm-up/extension slots in place; drop only if all empty
      wsets:(hasData(e.wsets)||e.wsets.some(s=>s.ck))?e.wsets.map(s=>({kg:str(s.kg),reps:str(s.reps),ck:s.ck?1:0})):[],
      xsets:(hasData(e.xsets)||(e.xsets||[]).some(s=>s.ck))?e.xsets.map(s=>({kg:str(s.kg),reps:str(s.reps),ck:s.ck?1:0})):[]}));
  if(pruned.length||S.done||S.gw) store.set(SKEY(S.date), JSON.stringify({date:S.date, program:pid, week:S.week, dayId:S.dayId, done:S.done, gw:S.gw?1:0, entries:pruned}));
  else store.remove(SKEY(S.date));
}
/* the workout that comes AFTER the most recent logged session before `date` */
function nextSlot(date){
  const last=listSessions().find(s=>s.date<date); // newest first
  if(!last) return null;
  const ids=dayList(pid,last.week).map(d=>d.id);
  const i=ids.indexOf(last.dayId);
  if(i<0) return null;
  const P=PROGRAMS[pid];
  if(i+1<ids.length) return {week:last.week, dayId:ids[i+1]};
  const nw=Math.min(P.weeks,last.week+1);               // finished the week -> roll to next
  return {week:nw, dayId:dayList(pid,nw)[0].id};
}
function loadSessionFor(date){
  curDate=date;
  const sv=getSaved(date);
  if(sv){ week=sv.week; dayId=sv.dayId; S=buildSession(date,sv.week,sv.dayId,sv.entries,sv.done,sv.gw); }
  else {
    const nx=nextSlot(date);                             // auto-advance to the next workout
    if(nx){ week=nx.week; dayId=nx.dayId; store.set(K(pid,'pos','w'),week); store.set(K(pid,'pos','d'),dayId); }
    S=buildSession(date,week,dayId,null,false,0);
  }
  openSet=new Set();
}
function prevTopSet(name,date){
  for(const s of listSessions()){
    if(s.date>=date) continue;
    const e=s.entries.find(x=>x.exName===name);
    if(e){ const t=topSet(e.sets); if(t) return {date:s.date,kg:t.kg,reps:t.reps,week:s.week,dayId:s.dayId}; }
  }
  return null;
}

/* ================= MIGRATION (old tap-365 data -> profile 1) ================= */
function migrate(){
  if(store.get('g2:migrated')==='1') return;
  store.keys('jn365:session:').forEach(k=>{
    try{
      const s=JSON.parse(store.get(k));
      const nk=['g2','p1','jn365','session',s.date].join(':');
      if(!store.get(nk)) store.set(nk, JSON.stringify({date:s.date,program:'jn365',week:s.week,dayId:s.dayId,done:s.done,
        entries:(s.entries||[]).map(e=>({exName:e.exName,done:false,sets:e.sets}))}));
    }catch(e){}
  });
  store.set('g2:migrated','1');
}

      card.querySelectorAll('input.auto').forEach(i=>i.classList.remove('auto')); } };
    card.querySelector('.exlink').onclick=()=>{ histEx=e.name; switchView('history'); };
    card.querySelectorAll('.srow').forEach(row=>{
      const si=+row.dataset.si;
      const isWu=row.dataset.wu==='1';
      const isX=row.dataset.x==='1';
      const arrOf=()=>isX?entry.xsets:(isWu?entry.wsets:entry.sets);
      row.querySelectorAll('input').forEach(inp=>{
        inp.addEventListener('input',()=>{
          touch();
          const s0=arrOf()[si];
          s0[inp.dataset.f]=inp.value; delete s0.a;
          // typing a working-set kg mirrors into untouched ★ rows (same weight / −25% chain)
          if(!isWu&&!isX&&inp.dataset.f==='kg'&&refreshXsets(entry,e)){
            card.querySelectorAll('.srow[data-x]').forEach(r=>{
              const xi=+r.dataset.si;
              const kIn=r.querySelector('input[data-f="kg"]');
              if(kIn) kIn.value=entry.xsets[xi].kg;
            });
          }
          commit();
          renderDays();
        });
      });
      const ck=row.querySelector('.sck');
      if(ck) ck.onclick=()=>{
        touch(); // checking a set confirms the pre-filled numbers
        const arr=arrOf();
        arr[si].ck=arr[si].ck?0:1;
        if(arr[si].ck) delete arr[si].a; // a checked set was really done
        // all working sets checked -> exercise done (collapses)
        if(!isWu && !isX && entry.sets.length && entry.sets.every(s=>s.ck)) { entry.done=true; openSet.delete(ei); finishExercise(entry); }
        commit(); renderList(); renderDays();
      };
    });
    card.querySelector('.addset').onclick=()=>{ touch(); entry.sets.push({kg:'',reps:''}); commit(); renderList(); };
    // Max box: capability anchor (RIR-0 weight for the rep range) — reseeds untouched suggestions
    const mxa=card.querySelector('.maxin:not(.todayin)');
    if(mxa) mxa.onchange=()=>{
      setWork(e.name, mxa.value);
      const nv=workTarget(e);                    // re-derive today's load from the new Max
      if(nv){
        entry.sets.forEach(s=>{ s.kg=String(nv); });
        const n=entry.wsets.length;
        entry.wsets.forEach((s,si)=>{ const p=(WU_PYRAMID[n]||[])[si];
          if(p) s.kg=String(round25(nv*p[0]/100)); });
        entry.xsets.forEach(s=>{ s.a=1; });
        refreshXsets(entry, e);
        const plan2=progressionPlan(e,curDate,week,entry.sets.length);
        entry.sets.forEach((s,i)=>{ if(str(s.reps)===''&&plan2&&plan2.reps[i]!=null) s.reps=String(plan2.reps[i]); });
      }
      commit(); renderList(); renderDays();
    };
    // Today box: literally today's working weight — applies to this session only, never rescaled
    const mx=card.querySelector('.todayin');
    if(mx) mx.onchange=()=>{
      const v=parseFloat(mx.value);
      if(isNaN(v)||v<=0) return;
      touch();                                   // this is a real decision — numbers become live
      entry.sets.forEach(s=>{ s.kg=String(v); });          // today's working weight
      const n=entry.wsets.length;
      entry.wsets.forEach((s,si)=>{ const p=(WU_PYRAMID[n]||[])[si];
        if(p) s.kg=String(round25(v*p[0]/100)); });        // warm-ups re-derived
      entry.xsets.forEach(s=>{ s.a=1; });                  // let the ★ mirror recompute
      refreshXsets(entry, e);
      commit(); renderList(); renderDays();
    };
    card.querySelector('.exdonebtn').onclick=()=>{
      entry._auto=false; // ✓ confirms the pre-filled numbers as done
      entry.done=!entry.done; openSet.delete(ei);
      if(entry.done) finishExercise(entry); // drop untouched suggested rows
      commit(); renderList(); renderDays();
    };
    list.appendChild(card);
  });
}
function changeDay(id){
  const sv=getSaved(curDate);
  // don't silently wipe a logged/done session by switching the day on the same date
  if(sv&&sv.dayId!==id&&(sv.done||(sv.entries||[]).length)){
    const nm=(dayList(pid,week).find(d=>d.id===sv.dayId)||{}).name||sv.dayId;
    if(!confirm('This date already has "'+nm+'" logged.\nSwitch the day and discard that log?\n(To see the next workout, just change the date instead.)')) return;
  }
  dayId=id; store.set(K(pid,'pos','d'),id);
  const same=sv&&sv.dayId===id;
  S=buildSession(curDate,week,id,same?sv.entries:null,same?sv.done:false,S.gw); // warm-up done survives day switch
  commit(); renderLog();
}
function changeWeek(d){
  const P=PROGRAMS[pid];
  const nw=Math.min(P.weeks,Math.max(1,week+d));
  if(nw===week) return;
  week=nw; store.set(K(pid,'pos','w'),week);
  const ids=dayList(pid,week).map(x=>x.id);
  if(!ids.includes(dayId)){ dayId=ids[0]; store.set(K(pid,'pos','d'),dayId); }
  S=buildSession(curDate,week,dayId,S.entries.filter(e=>!e._auto),S.done,S.gw); // carry only user-entered data
  commit(); renderLog();
}

function renderProgress(){
  const body=$('#histBody');
  const sessAsc=listSessions().slice().reverse();
  const names=[];
  sessAsc.forEach(s=>s.entries.forEach(e=>{ if(topSet(e.sets)&&!names.includes(e.exName)) names.push(e.exName); }));
  names.sort((a,b)=>a.localeCompare(b));
  if(!names.length&&!histEx){ body.innerHTML='<div class="empty">No exercise data yet.<br>Log some sets — or tap an exercise name 📈 on the Log tab.</div>'; return; }
  if(!histEx) histEx=names[0];
  const showNames=names.includes(histEx)?names:[histEx,...names]; // keep the tapped exercise even with no data yet
  let html='<div class="expick">'+showNames.map(n=>`<button data-ex="${esc(n)}" class="${n===histEx?'on':''}">${esc(n)}</button>`).join('')+'</div>';
  // chart
  const pts=[];
  sessAsc.forEach(s=>{ const e=s.entries.find(x=>x.exName===histEx); if(e){ const t=topSet(e.sets); if(t) pts.push({date:s.date,kg:t.kg,reps:t.reps}); } });
  html+=`<div class="chartbox"><h3>${esc(histEx)}</h3>`;
  if(pts.length){
    const d=+(pts[pts.length-1].kg-pts[0].kg).toFixed(2);
    html+=`<div class="csub">Top-set kg over time · ${pts.length} session${pts.length>1?'s':''}${pts.length>1?` · ${d>0?'+':''}${d} kg overall`:''}</div>`+lineChart(pts);
  } else html+='<div class="csub">No sessions logged for this exercise yet — it will chart here once you do.</div>';
  html+='</div>';
  // full W1/W2/S1/S2 log per date, newest first
  const hasAny=t=>str(t.kg)!==''||str(t.reps)!=='';
  const rows=[];
  listSessions().forEach(s=>{
    const e=s.entries.find(x=>x.exName===histEx);
    if(e&&((e.sets||[]).some(hasAny)||(e.wsets||[]).some(hasAny))) rows.push({s,e});
  });
  if(rows.length){
    html+='<ul class="slog">';
    rows.forEach(({s,e})=>{
      const line=(arr,pfx)=>arr.filter(hasAny).map(t=>
        `<span class="setpill${pfx==='W'?' wu':(pfx==='★'?' xs':'')}">${pfx}${arr.indexOf(t)+1} · ${str(t.kg)||'—'}kg × ${str(t.reps)||'—'}${t.ck?' ✓':''}</span>`).join('');
      const wLine=(e.wsets||[]).some(hasAny)?`<div class="setline">${line(e.wsets,'W')}</div>`:'';
      const sLine=(e.sets||[]).some(hasAny)?`<div class="setline">${line(e.sets,'S')}</div>`:'';
      const xLine=(e.xsets||[]).some(hasAny)?`<div class="setline">${line(e.xsets,'★')}</div>`:'';
      let vol=0; (e.sets||[]).forEach(t=>{const k=parseFloat(t.kg),r=parseFloat(t.reps); if(!isNaN(k)&&!isNaN(r)) vol+=k*r;});
      html+=`<li data-date="${s.date}">
        <div class="ck">${(e.done||s.done)?'✓':''}</div>
        <div class="sd"><div class="dt">${fmtShort(s.date)} · Week ${s.week}</div>
          ${wLine}${sLine}</div>
        <div class="vol"><div class="n">${Math.round(vol).toLocaleString()}</div><div class="l">kg volume</div></div>
      </li>`;
    });
    html+='</ul>';
  }
  body.innerHTML=html;
  body.querySelectorAll('.expick button').forEach(b=>{ b.onclick=()=>{ histEx=b.dataset.ex; renderProgress(); }; });
  body.querySelectorAll('.slog li').forEach(li=>{
    li.onclick=()=>{ loadSessionFor(li.dataset.date); switchView('log'); };
  });
}
function lineChart(points,unit){
  unit=unit||'kg';
  const W=520,H=210,padL=40,padR=14,padT=16,padB=28;
  const kgs=points.map(p=>p.kg);
  let min=Math.min(...kgs),max=Math.max(...kgs);
  if(min===max){ min=Math.max(0,min-2); max+=2; }
  const n=points.length;
  const px=i=>n===1?W/2:padL+(W-padL-padR)*i/(n-1);
  const py=v=>H-padB-(H-padT-padB)*(v-min)/(max-min);
  let grid='';
  for(let g=0;g<=3;g++){ const val=min+(max-min)*g/3,y=py(val);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#e7e4d6"/>`+
      `<text x="${padL-6}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="11" fill="#a7a897" font-family="monospace">${+val.toFixed(1)}</text>`; }
  const line=points.map((p,i)=>`${px(i).toFixed(1)},${py(p.kg).toFixed(1)}`).join(' ');
  let dots='';
  points.forEach((p,i)=>{ dots+=`<circle cx="${px(i).toFixed(1)}" cy="${py(p.kg).toFixed(1)}" r="4" fill="#5b6a3d" stroke="#fff" stroke-width="1.5"><title>${fmtShort(p.date)} — ${p.kg}${unit}${p.reps?` × ${esc(p.reps)}`:''}</title></circle>`; });
  const xl=[...new Set([0,n>1?n-1:0,n>2?Math.floor((n-1)/2):0])];
  const xlabels=xl.map(i=>`<text x="${px(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="11" fill="#8a8b7c" font-family="monospace">${fmtShort(points[i].date)}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" role="img">${grid}
    ${n>1?`<polygon points="${padL},${H-padB} ${line} ${W-padR},${H-padB}" fill="rgba(91,106,61,0.10)"/><polyline points="${line}" fill="none" stroke="#5b6a3d" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`:''}
    ${dots}${xlabels}</svg>`;
}

      </table>
    </div></details>

    <details class="ksec" open><summary><h3>RIR — the one number to remember</h3><span class="pm">+</span></summary>
    <div class="kc">
      <b>RIR (Reps In Reserve) = how many reps you still have left when you stop the set.</b>
      That's the only idea you need — everything in this app is shown as RIR.
      The 365 program's PDF uses RPE (Rate of Perceived Exertion) instead; same thing, flipped: <b>RIR = 10 − RPE</b>. The app converts it for you and shows the RPE in brackets.
      <table class="cheat">
        <tr><th>RIR</th><th>Meaning</th><th>Feel</th><th>= RPE</th></tr>
        <tr><td>4</td><td>stop with 4 reps left</td><td>Comfortable</td><td>6</td></tr>
        <tr><td>3</td><td>stop with 3 reps left</td><td>Moderate</td><td>7</td></tr>
        <tr><td>2</td><td>stop with 2 reps left</td><td>Hard</td><td>8</td></tr>
        <tr><td>1</td><td>stop with 1 rep left</td><td>Very hard</td><td>9</td></tr>
        <tr><td>0</td><td>to failure — nothing left 🔥</td><td>All out</td><td>10</td></tr>
      </table>
      Colour code on every card: <span class="eff e3">green — plenty left</span> · <span class="eff e1">gold — getting hard</span> · <span class="eff e0">red — to failure</span>
      <h4>How to choose your weight</h4>
      These programs prescribe <b>effort</b> (RPE or RIR), not kg. Pick a load that lands you at the target for the given rep range.
      Too easy → add weight next set/session. Hit the top of the rep range at the target effort → add a little weight (~2.5%).
      <h4>The "Max … kg / 10 reps" box (first time on an exercise only)</h4>
      One simple question, the same for every exercise: <b>what's the heaviest weight you could lift about 10 times?</b>
      Guess it — don't test it. From that the app computes today's load for the week's rep range and RIR target, plus warm-up percentages.
      <br><br>
      Example — Max 15 kg / 10 reps, exercise is 8–10 reps:
      <table class="cheat">
        <tr><th>Week says</th><th>Today's pre-fill</th></tr>
        <tr><td>RIR 3–4 (easy weeks)</td><td>≈ <b>12.5 kg</b> — room to spare</td></tr>
        <tr><td>RIR 1–2</td><td>≈ <b>13.5–14 kg</b></td></tr>
        <tr><td>RIR 0 🔥</td><td>≈ <b>15 kg</b> — all out</td></tr>
      </table>
      Guessed wrong? No problem — the first weeks are intentionally easy; just edit Today (or the set rows) and the app learns from what you actually lift.
      <b>The box disappears once the exercise has a logged session</b> — from then on your own history drives everything (Jeff's way: <i>"...your strength within the rep ranges given in the program"</i>, weeks 1–2 are for finding weights).
      <br><br>
      Priority of anchors for the pre-filled numbers: <b>what you typed today → last session's top set → the Max guess</b>.
      <h4>Progressive overload — Jeff's "double progression" rule</h4>
      <b>Reps first, weight second.</b> From the guidebook: add a rep to at least one set each week.
      Only once you hit the <b>top of the rep range on ALL working sets</b> do you add weight (smallest step — 2.5 kg or one machine pin), then drop back to the bottom of the range and climb again.
      <table class="cheat">
        <tr><th>Wk</th><th>10–12 reps @ 30 kg</th><th>Next move</th></tr>
        <tr><td>1</td><td>10, 10</td><td>add a rep somewhere</td></tr>
        <tr><td>2</td><td>11, 10</td><td>keep adding reps</td></tr>
        <tr><td>3</td><td>12, 12 — range maxed</td><td><b>now add weight</b></td></tr>
        <tr><td>4</td><td>32.5 kg: 10, 10</td><td>repeat the climb</td></tr>
      </table>
      Can't add reps or weight this week? Improving form — especially controlling the negative — and mind-muscle connection also count as overload. Never break form just to claim a rep.
      <br><br><b>If +2.5 kg is too big a jump</b> (drops you below the rep range): keep the old weight and extend the range instead — e.g. range 6–8 but 32.5 kg only gets you 4–5 reps → stay at 30 kg and aim for 6–10.
      <h4>Early sets vs last set</h4>
      When an exercise has multiple working sets, the early sets are slightly easier (higher RIR / lower RPE); the <b>last set</b> is pushed closest to failure — in later weeks sometimes all the way to failure (RIR 0).
      <h4>Rest times — between sets, not after the exercise</h4>
      The rest shown on each exercise (1–2 min, 3–5 min) is the pause <b>between working sets of that same exercise</b> (S1 → rest → S2).
      Between warm-up sets, ~30–60s is enough. Between two different exercises there's no strict rule — the time it takes to
      walk over and set up the next station (~1–2 min) is usually plenty.
      <h4>Intro &amp; deload weeks</h4>
      Min-Max: week 1 is an <b>intro week</b> (easier, learn the movements), week 7 is a <b>deload</b> (recover — lighter effort on purpose). 365: weeks 1–2 are for finding your working weights.
    </div></details>

    <details class="ksec"><summary><h3>Last-set intensity techniques (★ on cards)</h3><span class="pm">+</span></summary>
    <div class="kc">
      Later blocks add a technique to the <b>final working set</b> of some exercises (the gold ★ banner on the card — variants marked "on all sets" apply to every set). Block 1 has none. How to do each:
      <table class="cheat">
        <tr><th>Technique</th><th>How</th></tr>
        <tr><td>Drop set</td><td>Reach failure → strip ~25% of the weight → straight to failure again. "Two drop sets" = do that twice (3 back-to-back sets).</td></tr>
        <tr><td>Mechanical drop set</td><td>Reach failure → switch to an easier variation of the same movement (wider grip, better angle) → keep going. Same weight.</td></tr>
        <tr><td>Lengthened / long-length partials</td><td>Reach full-ROM failure → keep repping only the <b>stretched half</b> of the movement until you fail again.</td></tr>
        <tr><td>Myo-reps</td><td>Reach failure → rest 5 seconds → 2 reps. Repeat 5s + 2 reps until you can't complete 2 full reps (usually ~3 rounds).</td></tr>
        <tr><td>Weighted static hold</td><td>After the last rep, hold the stretched bottom position under load for ~30 seconds.</td></tr>
        <tr><td>Static stretch (30s)</td><td>Right after the last set, hold a weighted stretch of that muscle for ~30 seconds.</td></tr>
      </table>
      <h4>What "RIR 0" actually means (from the PDF)</h4>
      On the big lifts — <b>squat, barbell incline press, leg press, Smith machine lunge</b> — RIR 0 = nothing left, but <b>don't attempt and fail</b> a rep (safety).
      On all other exercises, RIR 0 = you attempted the next rep and <b>actually failed</b> it.
      <h4>Rest between exercises</h4>
      1–5 minutes depending on how demanding the exercise is — heavy compounds ~3–5′, isolation ~1–2′. Between warm-up sets: 0–60s.
    </div></details>

    <details class="ksec"><summary><h3>Warm-up protocol</h3><span class="pm">+</span></summary>
    <div class="kc">
      <h4>General (before every workout, 5–10 min)</h4>
      5–10 min light cardio (any machine) · <b>Arm Swings</b> 10/side · <b>Arm Circles</b> 10/side ·
      <b>Front-to-Back Leg Swings</b> 10/side · <b>Side-to-Side Leg Swings</b> 10/side · <b>Cable External Rotation</b> 15/side (optional).
      <h4>Exercise-specific (per the "Warm-up" count on each card)</h4>
      <table class="cheat">
        <tr><th>Listed</th><th>What to do</th></tr>
        <tr><td>1 set</td><td>~60% of working weight × 6–10 reps</td></tr>
        <tr><td>2 sets</td><td>~50% × 6–10 · ~70% × 4–6</td></tr>
        <tr><td>3 sets</td><td>~45% × 6–10 · ~65% × 4–6 · ~85% × 3–4</td></tr>
        <tr><td>4 sets</td><td>~45% × 6–10 · ~60% × 4–6 · ~75% × 3–5 · ~85% × 2–4</td></tr>
      </table>
      <h4>Staying injury-free</h4>
      Always warm up — cold muscles under heavy load are how tweaks happen. Control the negative (don't free-fall).
      Use full range of motion you can control. Sharp pain ≠ muscle burn: stop the exercise, use a substitution option that doesn't hurt.
      Respect rest days and the deload week — growth happens while recovering.
    </div></details>

    <details class="ksec"><summary><h3>Technique cues (all exercises)</h3><span class="pm">+</span></summary>
    <div class="kc">
      <input class="ksearch" id="cueSearch" placeholder="Search an exercise… e.g. squat, curl">
      <div id="cueList"></div>
    </div></details>
  </main>`;
  const listEl=$('#cueList');
  const renderCues=q=>{
    q=(q||'').toLowerCase();
    listEl.innerHTML=cues.filter(c=>!q||c.name.toLowerCase().includes(q)||c.notes.toLowerCase().includes(q))
      .map(c=>`<div class="cue"><div class="cn">${esc(c.name)} <span class="cprog">${esc(c.prog)}</span>
        ${c.video?`<a href="${esc(c.video)}" target="_blank" rel="noopener">▶ video</a>`:''}</div>
        <div class="ct">${esc(c.notes)}</div></div>`).join('')||'<div class="empty">No match.</div>';
  };
  renderCues('');
  $('#cueSearch').addEventListener('input',e=>renderCues(e.target.value));
}

/* ================= BACKUP / RESTORE ================= */
function allData(){
  const o={};
  store.keys('g2:').forEach(k=>o[k]=store.get(k));
  store.keys('jn365:').forEach(k=>o[k]=store.get(k)); // legacy, kept in backups
  return o;
}
function doExport(){
  const data={app:'gym-log',version:3,savedAt:new Date().toISOString(),data:allData()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  a.href=url; a.download=`gym-backup-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}.json`;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  store.set('g2:lastbackup',Date.now());
  const slot=$('#remindSlot'); if(slot) renderRemind();
}
function wireBackup(){
  const ex=$('#expBtn'); if(!ex) return;
  ex.onclick=doExport;
  $('#impBtn').onclick=()=>$('#impFile').click();
  $('#impFile').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const j=JSON.parse(r.result); const d=j.data||j;
        let n=0; Object.keys(d).forEach(k=>{ if(k.startsWith('g2:')||k.startsWith('jn365:')){ store.set(k,d[k]); n++; } });
        store.remove('g2:migrated'); migrate();
        profiles=getProfiles();
        alert('Restored '+n+' items ✓');
        enter(getProfiles().find(p=>p.id===activeP.id)||getProfiles()[0]);
      }catch(err){ alert('Could not read that file — pick a valid .json backup.'); }
      e.target.value='';
    };
    r.readAsText(f);
  };
}

function clearAllData(){
  if(!confirm('Delete ALL training data for BOTH profiles - sessions, maxes, measurements, calendar, history? Local AND cloud. This cannot be undone.')) return;
  if(!confirm('Really sure? Last chance.')) return;
  const keep=['g2:fbconfig','g2:device'];
  const doomed=store.keys('g2:').filter(k=>!keep.includes(k));
  doomed.forEach(k=>store.remove(k));
  rawStore.keys('jn365:').forEach(k=>rawStore.remove(k));   // legacy tap-365 keys
  doomed.forEach(k=>{ try{ pushKey(k); }catch(e){} });      // flush deletions to the cloud now
  alert('All data cleared. The app will restart.');
  setTimeout(()=>location.reload(), 1200);
}

/* ================= NAV ================= */
function switchView(v){
  if(v!=='history'&&view==='history') histEx=null; // leaving History resets the selection
  view=v;
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  if(v==='home') renderHome();
  else if(v==='log') renderLog();
  else if(v==='cal') renderCalendar();
  else if(v==='history') renderHistory();
  else if(v==='measure') renderMeasure();
  else renderLearn();
  window.scrollTo({top:0});
}
document.querySelectorAll('.tabs button').forEach(b=>{
  b.onclick=()=>{
    if((b.dataset.v==='log'||b.dataset.v==='history'||b.dataset.v==='cal')&&!pid){ switchView('home'); return; }
    if(b.dataset.v==='log'&&!S) loadSessionFor(todayStr());
    switchView(b.dataset.v);
  };
});
$('#pchip').onclick=()=>{ activeP=null; renderGate(); };
$('#cloudChip').onclick=cloudSetup;

/* ================= BOOT ================= */
(function boot(){
  const ps=getProfiles();
  const act=rawStore.get('g2:active');
  const p=ps.find(x=>x.id===act&&x.name);
  if(p) enter(p); else renderGate();
  initCloud();
  // PWA: offline cache + installable (only when hosted over http/https)
  if('serviceWorker' in navigator && /^https?:$/.test(location.protocol)){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
})();
</script>
